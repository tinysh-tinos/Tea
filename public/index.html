<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<title>Уровень воды и освещение</title>
	</head>
	<body>
		<h2>Данные с датчиков</h2>

		<!-- Картинка кружки -->
		<img
			id="cupImage"
			class="cup-img"
			alt="Кружка с водой"
		/>

		<div class="status">
			<p>
				Вода:
				<span id="waterValue">—</span>
				(Уровень:
				<span id="waterText">—</span>
				)
			</p>
			<p>
				Свет:
				<span id="lightValue">—</span>
				(Кружка:
				<span id="lightText">—</span>
				)
			</p>
		</div>

		<!-- Счётчик обновлений (для отладки) -->
		<p style="color: #aaa; margin-top: 10px; font-size: 12px">
			Обновлено:
			<span id="updateCount">0</span>
			раз
		</p>
	</body>
</html>
