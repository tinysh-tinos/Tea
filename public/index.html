<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<title>Уровень воды и вес</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<h2>Данные с весов</h2>
		<img
			id="cupImage"
			class="cup-img"
			alt="Кружка с водой"
		/>
		<div class="status">
			<p class="weight-display">
				Вес: <span id="weightValue">—</span> г
			</p>
			<p>
				Состояние:
				<span id="weightText">—</span>
			</p>
			<p>
				Кружка на весах:
				<span id="cupStatus">—</span>
			</p>
		</div>
		<p class="update-info">
			Обновлено:
			<span id="updateCount">0</span>
			раз
		</p>
		<div id="errorMessage" class="error"></div>
		<script src="script.js"></script>
	</body>
</html>
