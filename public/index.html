<!-- public/index.html -->
<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<title>Уровень воды и вес</title>
		<link
			rel="stylesheet"
			href="style.css"
		/>
	</head>
	<body>
		<div class="vubor1">
			<li class="title">Выберите кружку:</li>
			<div class="vubor">
				<div class="one">
					<img
						src="images/big_two.png"
						width="300"
					/>
					<li>Кружка чая/кофе</li>
					<label>
						<input
							type="checkbox"
							id="one"
						/>
						Выбрать
					</label>
				</div>
				<div class="two">
					<img
						src="images/big_two2.png"
						width="140"
					/>
					<li>Бутылка йогурта</li>
					<label>
						<input
							type="checkbox"
							id="two"
						/>
						Выбрать
					</label>
				</div>
				<div class="three">
					<img
						src="images/big_two4.png"
						width="140"
					/>
					<li>Банка колы/пепси</li>
					<label>
						<input
							type="checkbox"
							id="three"
						/>
						Выбрать
					</label>
				</div>
			</div>

			<button id="vidit">Далее</button>
		</div>

		<div class="main">
			<h2>Данные с весов</h2>

			<!-- Картинка будет показана только если выбран предмет и есть данные -->
			<img
				id="cupImage"
				class="cup-img"
				alt="Кружка с водой"
			/>

			<div class="status">
				<p class="weight-display">
					Вес:
					<span id="weightValue">—</span>
					г
				</p>
				<p>
					Состояние:
					<span id="weightText">—</span>
				</p>
				<p>
					Кружка на весах:
					<span id="cupStatus">—</span>
				</p>
			</div>

			<p class="update-info">
				Обновлено:
				<span id="updateCount">0</span>
				раз
			</p>

			<div
				id="errorMessage"
				class="error"
			></div>
		</div>

		<script src="script.js"></script>
	</body>
</html>
